name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -q tests
      - name: Import check
        run: python -c "import modern_tui.app"
      - name: Optional smoke check
        run: SMOKE_TEST=1 python "Modern TUI.py" || true
